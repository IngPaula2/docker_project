name: CI Docker Compose

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    name: Build backend and Docker images
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compilar backend con Maven
        working-directory: test15b
        run: ./mvnw clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir y subir imagen Docker del backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/test15b-backend:latest ./test15b
          docker push ${{ secrets.DOCKER_USERNAME }}/test15b-backend:latest

      - name: Construir imagen Docker del backend
        run: docker build -t test15b-backend ./test15b

      - name: Construir imagen Docker del frontend
        run: docker build -t test15b-frontend ./frontend_test
